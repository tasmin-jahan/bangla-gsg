# Hybrid Muon + AdamW optimizer config
# Spec: BanglaFM_Model_Implementation_Spec.md §4.2

# Muon: for all 2D dense matmul weights (~150M params)
muon:
  lr: 0.02
  momentum: 0.95
  nesterov: true
  ns_steps: 5                  # Newton-Schulz iterations
  weight_decay: 0.01           # decoupled

# AdamW: for everything else (~49M params — embeddings, norms, 1D params)
adamw:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1            # decoupled
  fused: true                  # PyTorch 2.x fused kernel
